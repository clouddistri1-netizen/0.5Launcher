<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Services Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sec: #a0a0a0;
            --accent: #bb86fc;
            --accent-hover: #995dd8;
            --border: #333;
            --tag-bg: #2c2c2c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 30px; color: var(--accent); letter-spacing: 1px;}

        /* Área de Pesquisa (Estilo "Controls") */
        .search-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
        }

        input[type="text"] {
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 6px;
            width: 100%;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        /* Grid de Serviços */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* Card do Serviço (Estilo "Image Box") */
        .service-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border-color: var(--accent);
        }

        .card-img-container {
            padding: 20px;
            background-color: #181818; /* Ligeiramente mais escuro que o card */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 160px;
        }

        .service-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
        }

        .card-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .service-title {
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 10px 0;
            text-align: center;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: auto; /* Empurra tags para o fundo */
        }

        .tag {
            background-color: var(--tag-bg);
            color: var(--text-sec);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .service-card:hover .tag {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Mensagem de erro */
        .no-results {
            color: var(--text-sec);
            font-size: 1.2rem;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 600px) {
            .services-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>0.5 Launcher</h1>

    <!-- Barra de Pesquisa -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar serviço ou tags..." autocomplete="off">
    </div>

    <!-- Grid -->
    <div class="services-grid" id="grid">
        {% for service in services %}
        <a href="{{ service.link }}" target="_blank" class="service-card" 
           data-name="{{ service.name.lower() }}" 
           data-tags="{{ service.tags.lower() }}">
            
            <div class="card-img-container">
                <!-- Se a imagem falhar, carrega um placeholder escuro -->
                <img src="{{ url_for('static', filename='imgs/' + service.img) }}" 
                     alt="{{ service.name }}"
                     onerror="this.src='https://placehold.co/200x200/1e1e1e/bb86fc?text=IMG'">
            </div>
            
            <div class="card-body">
                <div class="service-title">{{ service.name }}</div>
                <div class="tags-container">
                    {% for tag in service.tags.split(',') %}
                        <span class="tag">{{ tag.strip() }}</span>
                    {% endfor %}
                </div>
            </div>
        </a>
        {% endfor %}
    </div>

    <div id="noResults" class="no-results">
        Nenhum serviço encontrado :(
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.service-card');
        const noResults = document.getElementById('noResults');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            let visibleCount = 0;

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const tags = card.getAttribute('data-tags');

                if (name.includes(term) || tags.includes(term)) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            noResults.style.display = visibleCount === 0 ? 'block' : 'none';
        });
    </script>

</body>
</html>
